# Window styles
set-window-option -g window-status-style bg=colour214,fg=colour237
set-window-option -g window-status-activity-style bg=colour237,fg=colour248
set-window-option -g window-status-current-style bg=red,fg=colour237

# Statusbar style
set-option -g status "on"
set-option -g status-style bg=colour237,fg=colour223

# Pane styles
set-option -g pane-border-style fg=colour239
set-option -g pane-active-border-style fg=colour214
set-option -g display-panes-active-colour colour1
set-option -g display-panes-colour colour237

# Message style
set-option -g message-style bg=colour239,fg=colour223
set-option -g message-command-style bg=colour239,fg=colour223

# Decords
set-window-option -g clock-mode-colour colour109
set-window-option -g window-status-bell-style bg=colour167,fg=colour235

# Length of tmux status line
set -g status-left-length 30
set -g status-right-length 150

set-option -g status-left "\
#[fg=colour7, bg=colour241]#{?client_prefix,#[bg=colour167],} ❐ #S \
#[fg=colour241, bg=colour237]#{?client_prefix,#[fg=colour167],}#{?window_zoomed_flag, 🔍,}"

set-option -g status-right "\
#[fg=colour214, bg=colour237] \
#[fg=colour237, bg=colour214] #(uptime | awk -F'up ' '{print \"uptime \"$2}' | awk -F',  [0-9]+ user' '{print $1}') \
#[fg=colour223, bg=colour237] #(uptime | awk -F'load average: ' '{print $2}') \
#[fg=colour246, bg=colour237]  %b %d '%y\
#[fg=colour109]  %H:%M \
#[fg=colour248, bg=colour239]"

set-window-option -g window-status-current-format "\
#[fg=colour237, bg=colour214]\
#[fg=colour239, bg=colour214] #I* \
#[fg=colour239, bg=colour214, bold] #W \
#[fg=colour214, bg=colour237]"

set-window-option -g window-status-format "\
#[fg=colour237,bg=colour239,noitalics]\
#[fg=colour223,bg=colour239] #I \
#[fg=colour223, bg=colour239] #W \
#[fg=colour239, bg=colour237]"

# Mouse for resizing panes
set -g mouse on

# Base index & numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# History limit
set-option -g history-limit 5000

# Key bindings

### Leader key
unbind C-b
unbind C-q
set -g prefix C-q
bind C-q send-prefix

### Reload config key
unbind r
bind r source-file ~/.tmux.conf
display-message "Reloaded configuration: ~/.tmux.conf"

### New window
unbind c
bind-key c command-prompt -p "Name of new window: " "new-window -n '%%' -c '#{pane_current_path}'"

### Clear screen
unbind C
bind C send-keys 'C-l'

### Move windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

### Split panes
unbind %
unbind '"'

bind | split-window -hc "#{pane_current_path}"  
bind-key "\\" split-window -h -c "#{pane_current_path}"      # Split horizontally
bind-key "|" split-window -fh -c "#{pane_current_path}"      # Global split horizontally

bind - split-window -vc "#{pane_current_path}"
bind-key "-" split-window -v -c "#{pane_current_path}"       # Split vertically
bind-key "_" split-window -fv -c "#{pane_current_path}"      # Global split vertically

bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical

### Kill windows & panes
unbind C-7
unbind C-x
bind-key C-x kill-pane

# Vim motion
setw -g mode-keys vi
set -g status-keys vi
set-window-option -g mode-keys vi

### Resize pane
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

### Tmux Vim Navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf|foobar)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

bind-key -T copy-mode-vi 'C-[' send-keys -X cancel # ESC
